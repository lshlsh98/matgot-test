# =====================
# 기본 설정
# =====================
spring.application.name=matgot
server.port=8080

# =====================
# DB (Docker 기준)
# =====================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# =====================
# MyBatis
# =====================
mybatis.configuration.map-underscore-to-camel-case=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =====================
# AWS S3
# =====================
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket=${S3_BUCKET}

# =====================
# Google OAuth2
# =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# =====================
# NAVER API
# =====================
naver.client.id=${NAVER_CLIENT_ID}
naver.secret=${NAVER_SECRET}

# MemberController (네이버 OAuth 로그인)
naver.client.id.k=${NAVER_CLIENT_ID_k}
naver.client.secret.k=${NAVER_SECRET_k}

# =====================
# CLOVA OCR
# =====================
clova.ocr.secret-key=${CLOVA_SECRET_KEY}
clova.ocr.api-url=${CLOVA_API_URL}

# =====================
# Email (필요 시)
# =====================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# 로컬 파일 업로드 경로 (board 이미지, member 썸네일, trip 메뉴 이미지)
# =====================
file.root=/app/uploads/

# =====================
# Multipart (필수 안정 설정)
# =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB