# ============================================================
# Nginx 설정 파일 (React SPA + Spring Boot API 프록시)
# ============================================================

server {
    listen 80;
    server_name _;   # 모든 도메인/IP 요청 수락

    # 정적 파일 루트 (Vite 빌드 결과물 위치)
    root /usr/share/nginx/html;
    index index.html;

    # ── 파일 업로드 크기 제한 ─────────────────────────────────
    # Spring Boot 쪽 설정(50MB)과 맞춰서 설정
    client_max_body_size 50M;

    # ── gzip 압축 (응답 속도 향상) ───────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API 프록시: /api/** → Spring Boot 백엔드(8080) ────────
    # 프론트엔드와 백엔드가 같은 Docker 네트워크에 있으므로
    # 서비스 이름(matmatgotgot_back)으로 내부 DNS 해석 가능
    location /api/ {
        proxy_pass http://matmatgotgot_back:8080;   # 백엔드 컨테이너로 전달

        # 원본 요청 정보를 백엔드에 전달 (로깅/인증 등에 활용)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (필요 시 활성화)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade    $http_upgrade;
        # proxy_set_header Connection "upgrade";

        # 타임아웃 설정 (파일 업로드 등 오래 걸리는 요청 대비)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA 라우팅 ──────────────────────────────────────
    # React Router가 클라이언트 사이드 라우팅을 처리하므로
    # 파일이 없으면 항상 index.html을 반환 (404 방지)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 정적 자산 캐시 (성능 최적화) ─────────────────────────
    # Vite가 빌드 시 파일명에 해시를 붙이므로 장기 캐시 가능
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 보안 헤더 ─────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection      "1; mode=block" always;
}
