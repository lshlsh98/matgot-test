version: "3.8"

services:
  # ===================== DB =====================
  db:
    image: mysql:8.0
    container_name: matgotdb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - matgot-network

  # ===================== Backend =====================
  backend:
    build:
      context: ./matmatgotgot_back
    container_name: matgot-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ===== DB =====
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}

      # ===== JWT =====
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      # ===== AWS =====
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_REGION: ap-northeast-2
      S3_BUCKET: ${S3_BUCKET}

      # ===== GOOGLE =====
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

      # ===== NAVER =====
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_SECRET: ${NAVER_SECRET}

      # ===== CLOVA =====
      CLOVA_SECRET_KEY: ${CLOVA_SECRET_KEY}
      CLOVA_API_URL: ${CLOVA_API_URL}

      # ===== MAIL =====
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

    volumes:
      - uploads-data:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - matgot-network

  # ===================== Frontend =====================
  frontend:
    build:
      context: ./matmatgotgot_front
      args:
        VITE_BACKSERVER: "/api"
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_NAVER_MAP_KEY: ${VITE_NAVER_MAP_KEY}
    container_name: matgot-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - matgot-network

# =====================
# Volume
# =====================
volumes:
  mysql-data:
  uploads-data:

# =====================
# Network
# =====================
networks:
  matgot-network:
    driver: bridge
